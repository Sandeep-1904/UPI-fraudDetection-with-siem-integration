# logstash/pipeline/fraudshield.conf
# =====================================
# Receives JSON events from FastAPI backend (POST to port 5000)
# Enriches with tags, parses timestamp, indexes to Elasticsearch
# daily index: upi-fraud-YYYY.MM.DD

input {
  http {
    port => 5000
    codec => json
  }
}

filter {
  # Parse ISO8601 timestamp from FastAPI
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Enrich with risk-level tags
  if [risk_level] == "HIGH" {
    mutate {
      add_tag => ["fraud_alert", "high_risk"]
    }
  } else if [risk_level] == "MEDIUM" {
    mutate {
      add_tag => ["fraud_alert", "medium_risk"]
    }
  } else {
    mutate {
      add_tag => ["normal"]
    }
  }

  # Remove the raw timestamp string (we have @timestamp now)
  mutate {
    remove_field => ["headers"]
  }
}

output {
  elasticsearch {
    hosts    => ["http://elasticsearch:9200"]
    index    => "upi-fraud-%{+YYYY.MM.dd}"
    action   => "index"
  }

  # Optional: stdout for debug
  # stdout { codec => rubydebug }
}
