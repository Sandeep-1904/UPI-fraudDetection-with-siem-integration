version: "3.8"

# ══════════════════════════════════════════════════════
# ELK Stack — UPI FraudShield SIEM
#
# Services:
#   elasticsearch  port 9200   — stores fraud events
#   logstash       port 5000   — receives JSON from FastAPI
#   kibana         port 5601   — visualisation dashboard
#
# Usage:
#   docker compose up -d
#   Wait ~60s for all services to start
#   Open http://localhost:5601  (Kibana)
# ══════════════════════════════════════════════════════

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: es_fraudshield
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false       # disabled for local dev
      - xpack.security.http.ssl.enabled=false
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - elk
    healthcheck:
      test: ["CMD-SHELL","curl -s http://localhost:9200/_cat/health | grep -q green"]
      interval: 30s
      timeout: 10s
      retries: 5

  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: ls_fraudshield
    ports:
      - "5000:5000"        # HTTP input — FastAPI posts here
      - "9600:9600"        # Logstash monitoring API
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kb_fraudshield
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - elk
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  esdata:
    driver: local

networks:
  elk:
    driver: bridge
